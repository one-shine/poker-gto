name: Deploy to GitHub Pages

# main への push で dist をビルドし GitHub Pages へ自動公開。
# Pages 側の設定は Source: GitHub Actions(リポジトリ Settings → Pages)。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 並行デプロイを抑止(進行中はキャンセルせず最新を待つ)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (clean)
        run: npm ci

      # build = tsc -b(厳格な型チェック)+ vite build(base=/poker-gto/)+ sw プリキャッシュ注入
      - name: Build
        run: npm run build

      # 静的成果物として配信(Jekyll 処理を無効化する保険)
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
