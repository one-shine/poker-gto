name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (clean)
        run: npm ci

      - name: Lint
        run: npm run lint

      # build = tsc -b (厳格な型チェック) + vite build
      - name: Type-check & build
        run: npm run build

      - name: Test
        run: npm run test

      # 依存の脆弱性チェック (high 以上で失敗。0件想定)
      - name: Audit
        run: npm audit --audit-level=high
